<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>SHOVE UP — test</title>
<style>
  :root{
    --bg:#0e1120; --panel:#191d2e; --panel2:#242a3e;
    --accent:#ffb840; --accent-dim:#b8781c;
    --text:#eef1fa; --dim:rgba(238,241,250,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); min-height:100vh;
    font-family:"Bahnschrift","Segoe UI",system-ui,-apple-system,sans-serif;
    font-weight:700; display:flex; align-items:center; justify-content:center;
    padding:32px;
  }
  .wrap{
    width:100%; max-width:980px; background:var(--panel);
    border:2px solid rgba(255,255,255,.06); border-radius:22px;
    display:grid; grid-template-columns:1.25fr .85fr; overflow:hidden;
  }
  .left{padding:56px 52px}
  h1{font-size:clamp(46px,7vw,76px); letter-spacing:.5px; color:var(--accent); line-height:.95}
  .tag{color:var(--dim); font-size:18px; margin-top:10px; font-weight:600}
  .btn{
    display:inline-block; margin-top:38px; padding:22px 44px;
    background:var(--panel2); color:var(--text); text-decoration:none;
    font-size:26px; border-radius:12px; border-bottom:6px solid var(--accent-dim);
    transition:background .12s, border-color .12s, transform .12s;
  }
  .btn:hover{background:#2e3550; border-color:var(--accent); transform:translateY(-1px)}
  .btn:active{transform:translateY(2px); border-bottom-width:2px}
  .note{margin-top:16px; color:var(--dim); font-size:14px; font-weight:600}
  ol{margin:34px 0 0 18px; color:var(--dim); font-size:15px; font-weight:600; line-height:1.9}
  ol b{color:var(--text)}
  .foot{margin-top:38px; color:rgba(238,241,250,.22); font-size:13px}
  .right{position:relative; background:var(--bg); display:flex; align-items:flex-end; justify-content:center}
  .right img{width:100%; height:100%; object-fit:cover; object-position:center bottom; display:block}
  @media(max-width:820px){
    .wrap{grid-template-columns:1fr}
    .right{height:280px}
    .left{padding:40px 32px}
  }
</style>
</head>
<body>
  <main class="wrap">
    <section class="left">
      <h1>SHOVE UP</h1>
      <p class="tag">wspinaczka, pułapki i przepychanki</p>

      <a class="btn" href="https://github.com/Desirekk/tumbletrap-releases/releases/download/launcher-v1.0.0/ShoveUp-Launcher.exe">POBIERZ NA WINDOWS</a>
      <p class="note">Pobierasz raz. Launcher sam ściąga kolejne wersje gry.</p>

      <ol>
        <li>Uruchom launcher i kliknij <b>GRAJ</b></li>
        <li>W grze wpisz swój <b>nick</b></li>
        <li><b>Stwórz pokój</b> i podaj kod ekipie, albo <b>dołącz</b> ich kodem</li>
      </ol>

      <p class="foot">Grindare Studio · wersja testowa</p>
    </section>
    <aside class="right"><img src="hero.png" alt=""></aside>
  </main>
</body>
</html>
